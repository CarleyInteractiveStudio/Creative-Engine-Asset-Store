<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Creative Engine Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="index.html"><img src="assets/images/logo.png" alt="Creative Engine Store Logo"></a>
            <span>Creative Engine Store</span>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="category.html">Scripts</a></li>
                <li><a href="category.html">Modelos 2D</a></li>
                <li><a href="category.html">Escenas</a></li>
                <li><a href="category.html">Sonidos</a></li>
                <li><a href="category.html">UI</a></li>
                <li><a href="category.html">Efectos</a></li>
                <li><a href="category.html">Texturas</a></li>
            </ul>
        </nav>
        <div class="user-actions">
            <a href="login.html" class="btn btn-secondary">Iniciar Sesión</a>
            <a href="#" class="btn btn-primary">Registrarse</a>
        </div>
    </header>

    <main class="container">
        <div class="login-container">
            <!-- Formulario de inicio de sesión estándar -->
            <div id="standard-login-form">
                <h1>Iniciar Sesión</h1>
                <form>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-large">Iniciar Sesión</button>
                </form>
            </div>

            <!-- Formulario de inicio de sesión para desarrolladores (oculto por defecto) -->
            <div id="developer-login-form" style="display: none;">
                <h1>Acceso para Desarrolladores</h1>
                <form>
                    <div class="form-group">
                        <label for="dev-code">Código de Desarrollador</label>
                        <input type="text" id="dev-code" name="dev-code" required>
                    </div>
                    <div class="form-group">
                        <label for="dev-password">Contraseña del Código</label>
                        <input type="password" id="dev-password" name="dev-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-large">Acceder</button>
                    <button type="button" id="back-to-standard-login" class="btn btn-secondary">Volver</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2025 Creative Engine Store. Todos los derechos reservados.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
