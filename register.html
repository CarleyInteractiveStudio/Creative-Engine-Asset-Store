<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Creative Engine Store</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="index.html"><img src="assets/images/logo.png" alt="Creative Engine Store Logo"></a>
            <span>Creative Engine Store</span>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="category.html">Scripts</a></li>
                <li><a href="category.html">Modelos 2D</a></li>
                <li><a href="category.html">Escenas</a></li>
                <li><a href="category.html">Sonidos</a></li>
                <li><a href="category.html">UI</a></li>
                <li><a href="category.html">Efectos</a></li>
                <li><a href="category.html">Texturas</a></li>
            </ul>
        </nav>
        <div class="user-actions">
            <a href="login.html" class="btn btn-secondary">Iniciar Sesión</a>
            <a href="register.html" class="btn btn-primary">Registrarse</a>
        </div>
    </header>

    <main class="container">
        <div class="login-container">
            <h1>Crear una Cuenta</h1>
            <form id="register-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" name="confirm-password" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Registrarse</button>
            </form>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2025 Creative Engine Store. Todos los derechos reservados.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
