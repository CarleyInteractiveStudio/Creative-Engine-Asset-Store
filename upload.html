<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Producto - Creative Engine Asset Store</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="index.html"><img src="assets/images/logo.png" alt="Creative Engine Asset Store Logo"></a>
            <span>Creative Engine Asset Store</span>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="category.html">Scripts</a></li>
                <li><a href="category.html">Modelos 2D</a></li>
                <li><a href="category.html">Escenas</a></li>
                <li><a href="category.html">Sonidos</a></li>
                <li><a href="category.html">UI</a></li>
                <li><a href="category.html">Efectos</a></li>
                <li><a href="category.html">Texturas</a></li>
            </ul>
        </nav>
        <div class="user-actions">
            <!-- Esto será reemplazado por JS -->
        </div>
    </header>

    <main class="container">
        <h1>Subir Nuevo Asset</h1>
        <form id="upload-form" class="upload-form-layout">
            <div class="form-section">
                <div class="form-group">
                    <label for="product-name">Nombre del Producto</label>
                    <input type="text" id="product-name" name="product-name" required>
                </div>
                <div class="form-group">
                    <label for="product-description">Descripción</label>
                    <textarea id="product-description" name="product-description" rows="6" required></textarea>
                </div>
                <div class="form-group">
                    <label for="youtube-link">Enlace de YouTube (Opcional)</label>
                    <input type="url" id="youtube-link" name="youtube-link" placeholder="https://www.youtube.com/watch?v=...">
                </div>
            </div>
            <div class="form-section">
                <div class="form-group">
                    <label for="price">Precio (USD)</label>
                    <input type="number" id="price" name="price" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="category">Categoría</label>
                    <select id="category" name="category" required>
                        <option value="">Seleccione una categoría...</option>
                        <!-- Las categorías se podrían cargar dinámicamente en el futuro -->
                        <option value="1">Scripts</option>
                        <option value="2">Modelos 2D</option>
                        <option value="3">Escenas</option>
                        <option value="4">Sonidos</option>
                        <option value="5">UI</option>
                        <option value="6">Efectos</option>
                        <option value="7">Texturas</option>
                    </select>
                </div>
                 <div class="form-group">
                    <label for="product-file">Archivo Principal del Producto (.zip, .rar)</label>
                    <input type="file" id="product-file" name="product-file" accept=".zip,.rar" required>
                </div>
                <div class="form-group">
                    <label for="product-images">Imágenes de Vista Previa (hasta 3)</label>
                    <input type="file" id="product-images" name="product-images" accept="image/png, image/jpeg" multiple>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Enviar para Revisión</button>
            </div>
        </form>
    </main>

    <footer class="main-footer">
        <p>&copy; 2025 Creative Engine Asset Store. Todos los derechos reservados.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
